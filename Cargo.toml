[workspace]
resolver = "2"
members = [".", "actors", "console", "macros"]

[workspace.package]
edition = "2024"
license = "MIT OR Apache-2.0"
authors = ["Joel DSouza <joel@devrandom.co>"]
repository = "https://github.com/devrandom-labs/bombay"

[workspace.dependencies]
kameo = { path = ".", version = "0.21.0" }

futures = "0.3"
tokio = "1.47"

# ============================================================
# Bombay — god-level lint config (adopted from nexus, verbatim).
# Applied workspace-wide; vendored kameo code is NOT yet clean
# against this bar, so `nix flake check`'s clippy gate is RED by
# design until M1/M7 bring the surviving core up to standard.
# ============================================================
[workspace.lints.rust]
unexpected_cfgs = { level = "warn", check-cfg = ['cfg(tokio_unstable)'] }

[workspace.lints.clippy]
# 1. THE FOUNDATION
all = { level = "deny", priority = -1 }
pedantic = { level = "deny", priority = -1 }
nursery = { level = "deny", priority = -1 }

# 2. THE RUTHLESS RESTRICTIONS
unwrap_used = "deny"
expect_used = "deny"
panic = "deny"
todo = "deny"
unimplemented = "deny"
dbg_macro = "deny"
print_stdout = "deny"
print_stderr = "deny"
disallowed_methods = "deny"
disallowed_types = "deny"

# 3. MEMORY & PERFORMANCE STRICTNESS
clone_on_ref_ptr = "deny"
as_conversions = "deny"
str_to_string = "deny"
implicit_clone = "deny"

# 4. VARIABLE HYGIENE
shadow_reuse = "deny"
shadow_same = "deny"
shadow_unrelated = "deny"

# 5. THE "NO CHEATING" RULE
allow_attributes_without_reason = "deny"

[workspace.metadata.crane]
name = "bombay"

[profile.release]
lto = true
opt-level = 3
codegen-units = 1

[package.metadata.docs.rs]
all-features = true

[package]
name = "kameo"
version = "0.21.0"
edition = "2024"
rust-version = "1.88.0"
description = "Fault-tolerant Async Actors Built on Tokio"
readme = "README.md"
repository = "https://github.com/tqwewe/kameo"
license = "MIT OR Apache-2.0"
keywords = ["actor", "tokio"]
categories = ["asynchronous", "concurrency", "rust-patterns"]
include = ["/src"]

[features]
default = ["macros", "tracing"]
macros = ["dep:kameo_macros"]
console = ["dep:rmp-serde", "tokio/net", "tokio/io-util"]
remote = [
  "dep:const-fnv1a-hash",
  "dep:const-str",
  "dep:either",
  "dep:libp2p",
  "dep:linkme",
  "dep:rmp-serde",
]
tracing = ["dep:tracing", "tokio/tracing"]
otel = ["dep:opentelemetry", "dep:tracing-opentelemetry"]
metrics = ["dep:metrics"]
hotpath = ["dep:hotpath", "hotpath/hotpath"]

[dependencies]
kameo_macros = { version = "0.21.0", path = "./macros", optional = true }

const-fnv1a-hash = { version = "1.1.0", optional = true }
const-str = { version = "1.1", features = ["proc"], optional = true }
downcast-rs = "2.0.1"
dyn-clone = "1.0"
either = { version = "1.15.0", optional = true }
futures.workspace = true
hotpath = { version = "0.11", optional = true, features = ["tokio"] }
libp2p = { version = "0.56.0", features = [
  "cbor",
  "kad",
  "noise",
  "mdns",
  "quic",
  "request-response",
  "tcp",
  "tokio",
  "yamux",
], optional = true }
linkme = { version = "0.3.28", optional = true }
metrics = { version = "0.24.2", optional = true }
rmp-serde = { version = "1.3.0", optional = true }
serde = { version = "1.0", features = ["derive"] }
tokio = { workspace = true, features = ["macros", "rt", "sync", "time"] }
tracing = { version = "0.1", optional = true }
opentelemetry = { version = "0.31", optional = true }
tracing-opentelemetry = { version = "0.32", optional = true }

[dev-dependencies]
criterion = { version = "0.8", features = ["async_tokio"] }
kameo_actors = { path = "actors" }
libp2p = { version = "0.56.0", features = ["serde"] }
metrics-exporter-prometheus = "0.18"
tokio = { version = "1", features = [
  "macros",
  "rt",
  "rt-multi-thread",
  "signal",
  "sync",
  "time",
] }
tokio-stream = { version = "0.1.15", features = ["time"] }
tokio-test = "0.4.4"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }

[[example]]
name = "console"
required-features = ["console"]

[[example]]
name = "remote"
required-features = ["remote"]

[[example]]
name = "custom_swarm"
required-features = ["remote"]

[[example]]
name = "prometheus_metrics"
required-features = ["metrics"]

[[bench]]
name = "overhead"
harness = false

[lints]
workspace = true
