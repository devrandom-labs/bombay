name: CI

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# Normalize the key to the bare branch name so a branch push and its PR (which fire
# as separate `push` + `pull_request` events with *different* `github.ref`s — a branch
# ref vs a `refs/pull/N/merge` ref) share one group and collapse to a single gate run
# instead of running twice in parallel. `pull_request.head.ref` (PR events) and
# `github.ref_name` (push events) both resolve to the branch name.
concurrency:
  group: ci-${{ github.event.pull_request.head.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  checks:
    name: Nix Flake Check
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'flake.nix', 'flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      # The single CI gate. `nix flake check` builds every check in flake.nix —
      # including bombay-nextest (the entire workspace test suite) and
      # bombay-doctest (the doc-comment examples, which nextest does not run).
      # `-L` (--print-build-logs) streams FULL build logs instead of nix's
      # truncated "last 25 lines" on a failed derivation — essential for
      # diagnosing a failing test/scenario (e.g. which cucumber scenario flaked).
      - name: Flake Check
        run: nix flake check -L
