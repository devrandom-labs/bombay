name: mutants

# The reproducible mutation gate lives ENTIRELY inside the flake package
# `nix build .#mutants` — sweep + `mutants-gate` verdict tool, `tee`d to
# `./result/mutants-gate-report.txt`. This workflow just builds it and
# publishes the ratio. Quarantined off `nix flake check` (rebuild-per-mutant
# is too slow for per-push) — same pattern as miri.yml/fuzz.yml.
on:
  schedule:
    - cron: "0 5 * * *" # nightly 05:00 UTC (after fuzz 03:00 and miri 04:00)
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # Scope by event so a PR push cancels only the superseded PR run, never a
  # concurrently running nightly on the same ref.
  group: mutants-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  mutants-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v30
        with:
          nix_conf: |
            experimental-features = nix-command flakes
            accept-flake-config = true
            keep-env-derivations = true
            keep-outputs = true

      - name: Restore and save Nix store
        uses: nix-community/cache-nix-action@v6
        with:
          primary-key: nix-mutants-${{ runner.os }}-${{ hashFiles('Cargo.toml', 'flake.nix', 'flake.lock', 'Cargo.lock') }}
          restore-prefixes-first-match: nix-mutants-${{ runner.os }}-
          gc-max-store-size-linux: 1G
          purge: true
          purge-prefixes: nix-mutants-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never

      - name: Sweep + gate
        run: nix build .#mutants -L

      - name: Publish the viable-mutant ratio
        if: always()
        run: |
          if [ -f ./result/mutants-gate-report.txt ]; then
            {
              echo "### Mutation coverage"
              echo '```'
              cat ./result/mutants-gate-report.txt
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          else
            echo "::warning::no mutants-gate-report.txt produced by nix build .#mutants"
          fi

  mutants-gate:
    # Single stable check name. Requiring the sweep job directly would mean
    # contexts that silently drift; this collapses them into one. `always()`
    # so it still reports (as a failure) when a needed job fails or is
    # cancelled — a skipped required check leaves a PR stuck at "Expected".
    name: mutants-gate
    if: always()
    needs: [mutants-sweep]
    runs-on: ubuntu-latest
    steps:
      - name: Require the mutants sweep green
        run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            if [ "$result" != "success" ]; then
              echo "::error::the mutants sweep finished with result: $result"
              exit 1
            fi
          done
          echo "mutants sweep green"
