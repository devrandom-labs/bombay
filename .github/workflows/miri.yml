name: miri

on:
  schedule:
    - cron: "0 4 * * *" # nightly 04:00 UTC (an hour after cesr's deep-fuzz)
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # Scope by event so a PR push cancels only the superseded PR run, never a
  # concurrently running nightly on the same ref.
  group: miri-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  # PINNED (not floating `nightly`) so a MIRI finding reproduces on the exact
  # interpreter that produced it — these are unstable `-Z` flags with no
  # cross-version guarantee. MUST equal the date in flake.nix's `miriToolchain`.
  # Kept out of any rust-toolchain.toml on purpose: bombay builds stable-only
  # (#60) and nightly stays quarantined to this lane (#152).
  MIRI_TOOLCHAIN: nightly-2026-06-15

jobs:
  # Leg 1 — UB / data-race / leak sweep over the whole spine, single seed.
  # Measured 42 s real locally (79 passed / 3 filtered, isolation on).
  miri-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned nightly + miri
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MIRI_TOOLCHAIN }}
          components: miri, rust-src

      - name: Sweep
        # RUSTUP_TOOLCHAIN forces this step onto the pinned nightly — the
        # repo-root rust-toolchain.toml otherwise shadows it to stable.
        #
        # Isolation stays ON: it gives a deterministic clock and scheduler,
        # which is the whole point of a race lane. The cost is that proptest
        # cannot run (it writes .proptest-regressions; filesystem I/O is what
        # isolation forbids), hence `--skip prop_`. proptest's value is
        # input-space breadth, which MIRI does not add to — that surface is
        # #149/#152's bolero lane.
        env:
          RUSTUP_TOOLCHAIN: ${{ env.MIRI_TOOLCHAIN }}
          MIRIFLAGS: "-Zmiri-strict-provenance"
        run: cargo miri test -p bombay-core --lib -- --skip prop_

  # Leg 2 — schedule exploration over the tests that have real OS-thread
  # overlap (#172 re-pointed this leg; #150's trio was current_thread and had
  # no interleavings to explore). 16 seeds on PR, 64 on the nightly schedule —
  # see the seed-budget note on the step below.
  miri-seeds:
    runs-on: ubuntu-latest
    # Headroom over the measured worst case (#172): seeds run in parallel, so
    # cost tracks CPU on a 2-core runner. Locally 16 seeds x 2 tests = 18m53s
    # CPU, so the nightly's 64 seeds is ~75 min CPU ≈ 38 min there. 60 left too
    # little slack, and a timeout reports as a FAILURE — indistinguishable from
    # a real race, which is the misdiagnosis this lane exists to avoid.
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@v4

      - name: Install pinned nightly + miri
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.MIRI_TOOLCHAIN }}
          components: miri, rust-src

      - name: Explore schedules over the verified multi-threaded races
        # SCOPE (card #172). -Zmiri-many-seeds varies MIRI's scheduler choice
        # among READY OS THREADS (plus weak-memory read buffering), so a test
        # only contributes if its tasks genuinely occupy >1 thread. #150 pointed
        # this leg at three `#[tokio::test]` tests — current_thread, where
        # tokio::spawn never leaves the calling thread — so 64 seeds bought 64
        # near-identical executions.
        #
        # MEASURED, not assumed (thread-id probe, run and reverted):
        #   spawn.rs   concurrent_senders_single_writer  8 tasks/4 workers -> 4 threads
        #   mailbox.rs n_senders_one_receiver_order      8 tasks/4 workers -> 4 threads
        #   reply.rs   concurrent_send_and_recv          2 tasks/2 workers -> 1 thread
        #
        # reply.rs is EXCLUDED despite being `multi_thread` + Barrier: under
        # MIRI both its tasks drain from the spawning worker's local queue and
        # the second worker never steals, so it has nothing to permute. (On real
        # hardware it does overlap — this is a MIRI artifact, not a bad test,
        # and leg 1 still runs it at one seed.) The `multi_thread` flavor is
        # necessary but NOT sufficient: what matters is tasks > workers, enough
        # to overflow a local queue into stealing. Re-run the probe before
        # adding a test here.
        #
        # Sampling flume's real std::sync interleavings was the whole rationale
        # for choosing MIRI over loom/shuttle (ADR-0005: both need opt-in
        # instrumentation flume does not ship). This is the leg that discharges
        # it.
        #
        # -Zmiri-many-seeds-keep-going reports what FRACTION of seeds fail —
        # the difference between "flaky race" and "always broken".
        #
        # SEED BUDGET: seeds run in parallel, so cost tracks CPU, not wall
        # clock — and a runner has 2 cores. 64 seeds is too slow to sit on every
        # PR, so PRs get a 16-seed smoke and the nightly schedule gets the full
        # 64. A race needing seeds 16..64 is caught overnight rather than
        # pre-merge — the accepted trade.
        env:
          RUSTUP_TOOLCHAIN: ${{ env.MIRI_TOOLCHAIN }}
          MIRI_SEEDS: ${{ github.event_name == 'pull_request' && '0..16' || '0..64' }}
          MIRIFLAGS: "-Zmiri-strict-provenance -Zmiri-many-seeds=${{ github.event_name == 'pull_request' && '0..16' || '0..64' }} -Zmiri-many-seeds-keep-going"
        # The registry:: trio (card #119) needs no thread-id probe: each test
        # races plain `std::thread::scope` threads through papaya, and every
        # scoped std thread IS an OS thread under MIRI — the tasks>workers
        # caveat above is a tokio work-stealing artifact that cannot apply.
        # Measured cost: 1.6s + 1.6s + 2.2s per seed (aarch64, one seed) —
        # ~5 min CPU at 64 seeds, inside the budget.
        run: |
          echo "exploring seeds ${MIRI_SEEDS} (event: ${{ github.event_name }})"
          cargo miri test -p bombay-core --lib -- \
            concurrent_senders_single_writer_exact_count \
            n_senders_one_receiver_preserve_per_sender_order \
            registry::tests::concurrent_register_single_winner_on_one_name \
            registry::tests::concurrent_reclaim_of_dead_name_single_winner \
            registry::tests::concurrent_lookup_during_register_churn_is_consistent

  miri-gate:
    # Single stable check name. Requiring the leg jobs directly would mean
    # contexts that silently drift; this collapses them into one. `always()`
    # so it still reports (as a failure) when a needed job fails or is
    # cancelled — a skipped required check leaves a PR stuck at "Expected".
    name: miri-gate
    if: always()
    needs: [miri-sweep, miri-seeds]
    runs-on: ubuntu-latest
    steps:
      - name: Require every MIRI leg green
        run: |
          for result in ${{ join(needs.*.result, ' ') }}; do
            if [ "$result" != "success" ]; then
              echo "::error::a MIRI leg finished with result: $result"
              exit 1
            fi
          done
          echo "all MIRI legs green"
