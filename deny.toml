# cargo-deny config (mirrors the sibling nexus/agency repos). Without an
# explicit allow-list cargo-deny rejects EVERY license — even MIT/Apache-2.0 —
# so this is required for the `deny` flake check to pass. The list is the union
# of the permissive licenses present across kameo's dependency tree (incl. the
# libp2p / hyper / rustls transitive deps).
[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",                    # Unicode data tables
  "Unicode-DFS-2016",
  "MPL-2.0",                        # Mozilla Public License
  "Zlib",
  "BSL-1.0",
  "BlueOak-1.0.0",
  "CDLA-Permissive-2.0",
  "0BSD",
  "CC0-1.0",
  "Unlicense",
]
private = { ignore = true }

# `ring` ships a composite license that SPDX can't infer from its files alone.
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
